<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample HTML Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 50%;
        }
        table,
        th,
        td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Sample HTML Page</h1>
    <p>This is a simple HTML example showing basic elements.</p>

    <h2>Links</h2>
    <p>Visit <a href="https://www.example.com" target="_blank">Example.com</a> for more info.</p>

    <h2>Image</h2>
    <img src="https://via.placeholder.com/150" alt="Sample Image">

    <h2>Table Example</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Alice</td>
            <td>-1</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>30</td>
        </tr>
    </table>

</body>

</html>
</html>
